server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index upload.html;

    # CORS — required for EC2 public access 
    add_header 'Access-Control-Allow-Origin'  '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

    # POST /upload — file upload
    location = /upload {
        proxy_pass         http://backend:5000/upload;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 55M;
    }

    # GET /list — list all media
    location = /list {
        proxy_pass       http://backend:5000/list;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # GET /stats — statistics
    location = /stats {
        proxy_pass       http://backend:5000/stats;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # GET /status/<id> — processing status 
    location /status/ {
        proxy_pass       http://backend:5000/status/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # GET /media?id=<uuid> — metadata for detail page
    # Exact match comes first so it wins over the prefix match below
    location = /media {
        proxy_pass       http://backend:5000/media;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    #  DELETE /media/<uuid> — delete button 
    location /media/ {
        proxy_pass            http://backend:5000/media/;
        proxy_set_header      Host            $host;
        proxy_set_header      X-Real-IP       $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # GET /download/<uuid> — download button─
    location /download/ {
        proxy_pass            http://backend:5000/download/;
        proxy_set_header      Host            $host;
        proxy_set_header      X-Real-IP       $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;   # stream large files directly
    }

    #  GET /files/<filename> — serve uploaded files 
    location /files/ {
        proxy_pass       http://backend:5000/files/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering  off;
    }

    # /api/* — generic API pass-through 
    location /api/ {
        proxy_pass            http://backend:5000;
        proxy_set_header      Host            $host;
        proxy_set_header      X-Real-IP       $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        client_max_body_size  55M;
    }

    # Static frontend files 
    location / {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        try_files $uri $uri/ /upload.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Health check (Docker uses this) 
    location = /health {
        return 200 'frontend-ok';
        add_header Content-Type text/plain;
    }

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json;

    error_page 404 /upload.html;
}
