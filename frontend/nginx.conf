server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index upload.html;

    # ── Proxy backend routes used by the static UI (API_BASE = '') ─────
    # These are implemented by the Flask backend (see backend/app/main.py).
    location = /upload {
        proxy_pass http://backend:5000/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 55M;
    }

    location = /list {
        proxy_pass http://backend:5000/list;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /stats {
        proxy_pass http://backend:5000/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /status/ {
        proxy_pass http://backend:5000/status/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /media {
        proxy_pass http://backend:5000/media;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /files/ {
        proxy_pass http://backend:5000/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Serve static frontend files ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /upload.html;
        # No caching during development — browser always gets fresh files
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Proxy /api/* calls to the Flask backend ──────────────────────────
    # This means your frontend calls /api/upload (no localhost:5000 needed)
    # nginx forwards it to http://backend:5000/api/upload automatically
    # This also solves CORS — the browser thinks everything is on port 8080
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Handle large file uploads (50MB)
        client_max_body_size 55M;
    }

    # ── Health check endpoint (used by Docker) ───────────────────────────
    location /health {
        return 200 'frontend-ok';
        add_header Content-Type text/plain;
    }

    # Compression for faster loading
    gzip on;
    gzip_types text/css application/javascript;

    # 404 → go back to upload page
    error_page 404 /upload.html;
}
